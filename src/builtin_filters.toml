# ---------------------------------------------------------------------------
# rtk discover top unhandled — quarto render (169), pnpm build (243), trunk build (93)
# ---------------------------------------------------------------------------

[filters.quarto-render]
description = "Compact quarto render output"
match_command = "^quarto\\s+render"
strip_ansi = true
strip_lines_matching = [
  "^\\s*$",
  "^\\s*processing file:",
  "^\\s*\\d+/\\d+\\s",
  "^\\s*running",
  "^\\s*Rendering",
  "^pandoc ",
  "^  Validating",
  "^  Resolving",
]
match_output = [
  { pattern = "Output created:", message = "ok (output created)" },
]
max_lines = 20

[filters.pnpm-build]
description = "Compact pnpm build output (conservative — strips blanks and ANSI only)"
match_command = "^pnpm\\s+build"
strip_ansi = true
strip_lines_matching = ["^\\s*$"]
max_lines = 50

[filters.trunk-build]
description = "Compact trunk build output"
match_command = "^trunk\\s+build"
strip_ansi = true
strip_lines_matching = [
  "^\\s*$",
  "^\\s*Compiling\\s",
  "^\\s*Downloading\\s",
  "^\\s*Fetching\\s",
  "^\\s*Fresh\\s",
  "^\\s*Checking\\s",
]
tail_lines = 10
max_lines = 30
on_empty = "trunk build: ok"

